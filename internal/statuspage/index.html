<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} — Status</title>
<meta http-equiv="refresh" content="5">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; padding: 24px; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header .badge { font-size: 12px; padding: 2px 8px; border-radius: 12px; background: #238636; color: #fff; }
  .header .badge.warn { background: #d29922; }
  .header .badge.err { background: #da3633; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 8px 12px; border-bottom: 1px solid #30363d; color: #8b949e; font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  td { padding: 8px 12px; border-bottom: 1px solid #21262d; }
  tr:hover { background: #161b22; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot.good { background: #3fb950; }
  .dot.degraded { background: #d29922; }
  .dot.poor { background: #da3633; }
  .dot.offline { background: #484f58; }
  .quality { font-size: 12px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
  .quality.good { background: #0d2818; color: #3fb950; }
  .quality.degraded { background: #2a1f00; color: #d29922; }
  .quality.poor { background: #2d0000; color: #da3633; }
  .quality.offline { background: #1c1c1c; color: #484f58; }
  .footer { margin-top: 24px; font-size: 12px; color: #484f58; }
  .mono { font-family: 'SF Mono', Consolas, monospace; font-size: 13px; }
  @media (max-width: 600px) { body { padding: 12px; } table { font-size: 13px; } }
</style>
</head>
<body>
  <div class="header">
    <h1>{{.Title}}</h1>
    <span class="badge{{if lt .OnlineCount .TotalCount}} warn{{end}}{{if eq .OnlineCount 0}} err{{end}}">{{.OnlineCount}} / {{.TotalCount}} online</span>
  </div>

  {{if .Nodes}}
  <table>
    <thead>
      <tr>
        <th>Status</th>
        <th>Name</th>
        <th>VPN IP</th>
        <th>Quality</th>
        <th>RTT</th>
        <th>Loss</th>
        <th>NAT</th>
        <th>Last Seen</th>
      </tr>
    </thead>
    <tbody>
      {{range .Nodes}}
      <tr>
        <td><span class="dot {{.Quality}}"></span></td>
        <td class="mono">{{.Name}}</td>
        <td class="mono">{{.VPNIP}}</td>
        <td><span class="quality {{.Quality}}">{{.Quality}}</span></td>
        <td class="mono">{{.RTTMs}}</td>
        <td class="mono">{{.LossPct}}</td>
        <td>{{.NATType}}</td>
        <td>{{.LastSeen}}</td>
      </tr>
      {{end}}
    </tbody>
  </table>
  {{else}}
  <p style="color:#8b949e">No nodes registered.</p>
  {{end}}

  <div class="footer">
    Auto-refreshes every 5 seconds.
  </div>
</body>
</html>
